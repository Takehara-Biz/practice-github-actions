name: Environment Variables
description: Try to use the environment variables of github actions
on: push
env:
    EXAMPLE: Defined by workflow level
jobs:
    use-env:
        runs-on: ubuntu-latest
        steps:
            - run: echo "${EXAMPLE}" # expects to print "Defined by workflow level"
            - env:
                EXAMPLE: Defined by step level
              run: echo "${EXAMPLE}" # expects to print "Defined by step level"