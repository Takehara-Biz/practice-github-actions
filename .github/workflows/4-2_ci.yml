name: 4-2 CI
description: Node.jsのプログラムのCI用ワークフロー
on: workflow_dispatch
jobs:
  ci:
    runs-on: ubuntu-latest
    # ジョブ内のすべての run ステップのデフォルト作業ディレクトリを固定
    defaults:
      run:
        working-directory: ./4-2_src
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run lint
      - run: npm test
