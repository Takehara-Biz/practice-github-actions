name: Cache
on: push
jobs:
  use-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/cache@v4                         # キャッシュの復元と保存
        with:
          key: abc # キャッシュキー
          path: ${{ github.workspace }}/cache123          # キャッシュ対象のパス
      - run: |
          if [[ -f "${GITHUB_WORKSPACE}/dummy" ]]; then exit 0; fi
          dd if=/dev/urandom of="${GITHUB_WORKSPACE}/dummy" bs=1M count=1
          sleep 10
          echo "waited 10 sec"
      - run: ls -lh "${GITHUB_WORKSPACE}/dummy"
