name: Cache
on: push
jobs:
  use-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v4                         # キャッシュの復元と保存
        with:
          key: key123 # キャッシュキー
          path: ${{ github.workspace }}/cache123          # キャッシュ対象のパス
      - run: |
          if [[ -f "${GITHUB_WORKSPACE}/cache123" ]]; then exit 0; fi
          dd if=/dev/urandom of="${GITHUB_WORKSPACE}/cache123" bs=1M count=1
          sleep 5
          echo "waited 5 sec"
      - run: ls -lh "${GITHUB_WORKSPACE}/cache123"
