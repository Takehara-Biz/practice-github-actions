name: secrets and variables
on: push
jobs:
  print-secrets-and-variables:
    runs-on: ubuntu-latest
    environment: env01
    env:
      REPO_ENV_1: ${{ vars.REPO_ENV_1 }}
      REPO_SECRET_1: ${{ vars.REPO_SECRET_1 }}
    steps:
      - run: echo "${ENV_VAR_1}"
      - run: echo "${ENV_SECRET_1}"
      - run: echo "${REPO_ENV_1}"
      - run: echo "${REPO_SECRET_1}"