name: Logging
description: This workflow demonstrates logging in GitHub Actions.
on: push
jobs:
  logging:
    runs-on: ubuntu-latest
    env:
      PASSWORD: abc
    steps:
      - run: echo "Hello, world"
      - run: echo "::debug::This is a debug log"
      - run: |
          date
          date
          set -x
          date # ←このdateという命令文も表示されるようになる。
          date
          set +x
          date
          date
      - name: "ロググループ"
        run: |
          echo "1"
          echo "::group::This is a log group (folded by default)"
          echo "2"
          echo "3"
          echo "::endgroup::"
          echo "4"
      - name: "マスキング"
       run: |
          echo "${PASSWORD} is not masked"
          echo "::add-mask::${PASSWORD}"
          echo "${PASSWORD} is not masked"
      - name: "アノテーション"
        run: |
          echo "::error::This is an error, also shown in Annotions area."
          echo "::warning::This is a warning, also shown in Annotions area."
          echo "::notice::This is a notice, also shown in Annotions area."
      - name: "ジョブサマリー"
        run: |
          echo "The below info will be shown in logging summary area as Markdown format."
          echo "## markdown!" >> "${GITHUB_STEP_SUMMARY}"
          echo "- 1st item" >> "${GITHUB_STEP_SUMMARY}"
          echo "- 2nd item" >> "${GITHUB_STEP_SUMMARY}"
