name: 3-1 Context and Environment Variables
description: Try to use context and environment variables of github actions
on: workflow_dispatch
env:
  EXAMPLE: Defined by workflow level
jobs:
  print-info:
    runs-on: ubuntu-latest
    steps:
      - run: echo "### print context"
      - run: echo "github.actor - ${{ github.actor }}"
      - run: echo "github.run_id - ${{ github.run_id }}"
      - run: echo "github.event_name - ${{ github.event_name }}"
      - run: echo "github.event - ${{ github.event }}"
      - run: echo "github.event.repository - ${{ toJSON(github.event.repository) }}"
      - run: echo "github.event.repository.updated_at - ${{ github.event.repository.updated_at }}"
      - run: echo "github.event.runner - ${{ toJSON(runner) }}"
      - run: echo "github.event.runner.name - ${{ runner.name }}"
      - run: echo "github.event.runner.os - ${{ runner.os }}"
      - run: echo "### print env"
      - run: echo "GITHUB_ACTOR - ${GITHUB_ACTOR}"
      - run: echo "GITHUB_RUN_ID - ${GITHUB_RUN_ID}"
      - run: echo "GITHUB_EVENT_NAME - ${GITHUB_EVENT_NAME}"
      - run: echo "Linuxの環境変数" && printenv
      - run: echo "### check the scope of env"
      - run: echo "${EXAMPLE}" # expects to print "Defined by workflow level"
      - env:
          EXAMPLE: Defined by step level
        run: echo "${EXAMPLE}" # expects to print "Defined by step level"
  update-env:
    runs-on: ubuntu-latest
    env:
      VAR1: aaa
    steps:
      - run: echo "${VAR1}" # expects to print "aaa"
      - run: echo "VAR1=bbb" >> $GITHUB_ENV
      - run: echo "${VAR1}" # expects to print "bbb"
