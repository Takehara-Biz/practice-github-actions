name: 5-9 Artifact
on: workflow_dispatch
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - run: date > date.txt
      - uses: actions/upload-artifact@v4
        with:
          name: uploaded-artifact
          path: date.txt
          retention-days: 1
  download:
    runs-on: ubuntu-latest
    needs: upload
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: uploaded-artifact
          path: downloaded-artifact
      - run: cat downloaded-artifact/date.txt    